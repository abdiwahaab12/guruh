<div class="row g-4">
    <div class="col-lg-5">
        <div class="admin-system-panel">
            <h2 class="h6 mb-3">Cache Status</h2>
            <dl class="row mb-0">
                <dt class="col-sm-6">Entries</dt><dd class="col-sm-6">{{ cache_stats.entry_count }}</dd>
                <dt class="col-sm-6">Total Size</dt><dd class="col-sm-6">{{ cache_stats.total_label }}</dd>
                <dt class="col-sm-6">Last Rebuilt</dt><dd class="col-sm-6">{{ cache_stats.last_rebuilt_label }}</dd>
            </dl>
        </div>
    </div>
    <div class="col-lg-7">
        <div class="admin-system-panel">
            <h2 class="h6 mb-3">Cache Actions</h2>
            <p class="text-muted small">Clear removes all cached entries. Rebuild pre-warms dashboard data into the cache store.</p>
            <div class="d-flex flex-wrap gap-2">
                <form method="post" action="{{ url_for('admin.system_cache_clear') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-trash me-1"></i> Clear Cache
                    </button>
                </form>
                <form method="post" action="{{ url_for('admin.system_cache_rebuild') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="bi bi-arrow-clockwise me-1"></i> Rebuild Cache
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
