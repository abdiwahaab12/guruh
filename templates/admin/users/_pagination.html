{% if list_page.total_pages > 1 %}
<nav aria-label="Pagination" class="mt-3">
    <ul class="pagination justify-content-center">
        {% for p in range(1, list_page.total_pages + 1) %}
        <li class="page-item{% if p == list_page.page %} active{% endif %}">
            <a class="page-link" href="{{ url_for('admin.users_dashboard', tab=list_page.tab, page=p, q=list_page.query, role_slug=list_page.filters.get('role_slug', ''), status=list_page.filters.get('status', ''), action=list_page.filters.get('action', ''), sort=list_page.sort) }}">{{ p }}</a>
        </li>
        {% endfor %}
    </ul>
</nav>
{% endif %}
