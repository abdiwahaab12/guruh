<div class="dropdown admin-user-menu">
    <button class="btn admin-user-toggle dropdown-toggle"
            type="button"
            id="adminUserDropdown"
            data-bs-toggle="dropdown"
            aria-expanded="false"
            aria-label="User menu">
        <span class="admin-user-avatar" aria-hidden="true">
            {{ user.first_name[:1] if user.first_name else 'A' }}{{ user.last_name[:1] if user.last_name else '' }}
        </span>
        <span class="admin-user-meta d-none d-md-flex">
            <span class="admin-user-name">{{ user.full_name }}</span>
            <span class="admin-user-role">{{ user.role.name if user.role else 'Admin' }}</span>
        </span>
    </button>
    <ul class="dropdown-menu dropdown-menu-end admin-user-dropdown" aria-labelledby="adminUserDropdown">
        <li class="dropdown-header">
            <strong>{{ user.full_name }}</strong>
            <div class="small text-muted">{{ user.email }}</div>
        </li>
        <li><hr class="dropdown-divider"></li>
        <li>
            <a class="dropdown-item" href="{{ url_for('admin.users_dashboard') }}">
                <i class="bi bi-person me-2" aria-hidden="true"></i>
                <span data-i18n="user.profile">Profile</span>
            </a>
        </li>
        <li>
            <a class="dropdown-item" href="{{ url_for('admin.settings_hub') }}">
                <i class="bi bi-gear me-2" aria-hidden="true"></i>
                <span data-i18n="user.settings">Settings</span>
            </a>
        </li>
        <li><hr class="dropdown-divider"></li>
        <li>
            <a class="dropdown-item text-danger" href="{{ url_for('admin.logout') }}">
                <i class="bi bi-box-arrow-right me-2" aria-hidden="true"></i>
                <span data-i18n="user.logout">Logout</span>
            </a>
        </li>
    </ul>
</div>
