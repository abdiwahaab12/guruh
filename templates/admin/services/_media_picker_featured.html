<div class="admin-media-picker-field mb-3">
    <label class="form-label" for="image">Featured Image (Media Path)</label>
    <div class="input-group mb-2">
        {{ form.image(class="form-control", id="image") }}
        <a href="{{ url_for('admin.media_library', folder='services') }}" class="btn btn-outline-secondary" target="_blank" rel="noopener">Browse Library</a>
    </div>
    {% if form.image.data %}
    <img src="{{ url_for('static', filename=form.image.data) }}" alt="Featured preview" class="admin-services-featured-preview" loading="lazy">
    {% endif %}
    <div class="admin-media-picker-grid mt-2">
        {% for asset in media_assets[:12] %}
        <button type="button" class="admin-media-picker-btn" data-target="image" data-path="{{ asset.storage_path }}">
            <img src="{{ url_for('static', filename=asset.storage_path) }}" alt="{{ asset.title }}" loading="lazy">
        </button>
        {% endfor %}
    </div>
</div>
