<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Premium construction site at dusk">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#0f2438"/>
      <stop offset="45%" stop-color="#1a4a6e"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d3d3d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#33A8FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#33A8FF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#33A8FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="vignette" x1="0%" y1="50%" x2="70%" y2="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Atmospheric light -->
  <ellipse cx="320" cy="180" rx="420" ry="280" fill="#33A8FF" opacity="0.08"/>
  <ellipse cx="1500" cy="220" rx="360" ry="220" fill="#E91E63" opacity="0.05"/>

  <!-- Distant city skyline -->
  <g fill="#1e1e1e" opacity="0.85">
    <rect x="0" y="520" width="140" height="560"/>
    <rect x="160" y="460" width="110" height="620"/>
    <rect x="290" y="500" width="95" height="580"/>
    <rect x="410" y="420" width="130" height="660"/>
    <rect x="560" y="480" width="100" height="600"/>
    <rect x="680" y="390" width="150" height="690"/>
    <rect x="860" y="450" width="120" height="630"/>
    <rect x="1000" y="370" width="160" height="710"/>
    <rect x="1180" y="430" width="110" height="650"/>
    <rect x="1320" y="360" width="140" height="720"/>
    <rect x="1480" y="410" width="120" height="670"/>
    <rect x="1620" y="480" width="130" height="600"/>
    <rect x="1760" y="440" width="160" height="640"/>
  </g>

  <!-- Window lights -->
  <g fill="#33A8FF" opacity="0.22">
    <rect x="430" y="460" width="22" height="28"/><rect x="470" y="460" width="22" height="28"/>
    <rect x="430" y="520" width="22" height="28"/><rect x="470" y="520" width="22" height="28"/>
    <rect x="710" y="430" width="24" height="30"/><rect x="760" y="430" width="24" height="30"/>
    <rect x="710" y="490" width="24" height="30"/><rect x="760" y="490" width="24" height="30"/>
    <rect x="1030" y="410" width="24" height="30"/><rect x="1080" y="410" width="24" height="30"/>
    <rect x="1030" y="470" width="24" height="30"/><rect x="1080" y="470" width="24" height="30"/>
    <rect x="1350" y="400" width="22" height="28"/><rect x="1390" y="400" width="22" height="28"/>
  </g>

  <!-- Ground / site -->
  <rect x="0" y="820" width="1920" height="260" fill="url(#ground)"/>
  <path d="M0,820 Q480,780 960,820 T1920,820 L1920,1080 L0,1080 Z" fill="#2f2f2f" opacity="0.9"/>

  <!-- Road -->
  <path d="M0,900 L1920,900 L1920,980 L0,980 Z" fill="#252525"/>
  <g stroke="#fbbf24" stroke-width="4" opacity="0.35">
    <line x1="120" y1="940" x2="280" y2="940"/>
    <line x1="420" y1="940" x2="580" y2="940"/>
    <line x1="720" y1="940" x2="880" y2="940"/>
    <line x1="1020" y1="940" x2="1180" y2="940"/>
    <line x1="1320" y1="940" x2="1480" y2="940"/>
    <line x1="1620" y1="940" x2="1780" y2="940"/>
  </g>

  <!-- Tower crane -->
  <g stroke="#33A8FF" stroke-width="4" fill="none" opacity="0.75" filter="url(#softGlow)">
    <line x1="1280" y1="180" x2="1280" y2="860"/>
    <line x1="1280" y1="220" x2="1680" y2="360"/>
    <line x1="1280" y1="360" x2="980" y2="360"/>
    <line x1="1520" y1="360" x2="1520" y2="520"/>
    <polygon points="1510,520 1530,520 1520,540" fill="#33A8FF" opacity="0.6"/>
  </g>
  <rect x="1258" y="860" width="44" height="24" fill="#33A8FF" opacity="0.35" rx="2"/>

  <!-- Building under construction (frame) -->
  <g stroke="#A0D2F2" stroke-width="3" fill="none" opacity="0.55">
    <rect x="220" y="560" width="280" height="260"/>
    <line x1="220" y1="620" x2="500" y2="620"/>
    <line x1="220" y1="680" x2="500" y2="680"/>
    <line x1="220" y1="740" x2="500" y2="740"/>
    <line x1="300" y1="560" x2="300" y2="820"/>
    <line x1="380" y1="560" x2="380" y2="820"/>
    <line x1="460" y1="560" x2="460" y2="820"/>
  </g>

  <!-- Excavator silhouette -->
  <g fill="#3d3d3d" opacity="0.9">
    <rect x="620" y="760" width="180" height="44" rx="8"/>
    <rect x="650" y="720" width="90" height="44" rx="4"/>
    <path d="M740,720 L860,660 L880,680 L760,740 Z"/>
    <circle cx="670" cy="810" r="28" fill="#2a2a2a" stroke="#33A8FF" stroke-width="3"/>
    <circle cx="760" cy="810" r="28" fill="#2a2a2a" stroke="#33A8FF" stroke-width="3"/>
  </g>

  <!-- Concrete pillars -->
  <g fill="#4a4a4a" opacity="0.8">
    <rect x="920" y="640" width="36" height="180"/>
    <rect x="990" y="600" width="36" height="220"/>
    <rect x="1060" y="660" width="36" height="160"/>
  </g>

  <!-- Light beam accent -->
  <rect x="0" y="300" width="1920" height="120" fill="url(#beam)" opacity="0.6"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="270" x2="1920" y2="270"/><line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="480" y1="0" x2="480" y2="1080"/><line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/>
  </g>

  <!-- Vignette for text readability (bottom-left) -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
